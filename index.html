<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate Verification - Arkia</title>

<!-- IMPORTANTE: Importando a fonte Baloo 2 e a de fallback (Playfair Display) direto do Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&family=Playfair+Display:ital,wght@0,600;0,800;1,400&display=swap" rel="stylesheet">

<style>
  /* Fonte TAN ANGLETON (Carregada localmente se o arquivo estiver na pasta) */
  @font-face {
    font-family: 'Tan Angleton';
    src: url('tan-angleton.woff2') format('woff2'),
         url('tan-angleton.woff') format('woff'),
         url('tan-angleton.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }

  body {
    margin: 0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    min-height: 100vh;
    padding: 30px 20px;
    box-sizing: border-box;
  }

  .card-status {
    background: #ffffff;
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    max-width: 500px;
    width: 100%;
    text-align: center;
    margin-top: 10vh;
  }

  .logo { width: 140px; margin-bottom: 20px; }
  h1 { margin: 10px 0; color: #0f172a; font-size: 24px; }
  .valid { color: #16a34a; font-weight: bold; font-size: 18px; margin: 10px 0; }
  .invalid { color: #dc2626; font-weight: bold; font-size: 18px; margin: 10px 0; }

  /* Painel de Controle Superior */
  .painel-controle {
    background: #ffffff;
    padding: 24px 40px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    width: 842px;
    max-width: 100%;
    text-align: center;
    margin-bottom: 25px;
    box-sizing: border-box;
  }

  .botoes {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 15px;
  }

  .btn-baixar, .btn-linkedin {
    padding: 12px 24px;
    border-radius: 8px;
    font-weight: bold;
    font-size: 14px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
    border: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .btn-baixar { background-color: #0f172a; color: white; }
  .btn-baixar:hover { background-color: #334155; }
  .btn-linkedin { background-color: #0a66c2; color: white; }
  .btn-linkedin:hover { background-color: #004182; }

  /* =======================================================
     ÁREA DO CERTIFICADO DINÂMICO
     ======================================================= */
  .certificado-area {
    position: relative;
    width: 842px;  
    height: 595px;
    margin: 0 auto 40px auto;
    box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    background-color: #ffffff;
    overflow: hidden;
  }

  .certificado-fundo {
    width: 100%;
    height: 100%;
    display: block;
  }

  .texto-dinamico {
    position: absolute;
    font-family: 'Arial', sans-serif;
    color: #111111;
  }

  /* 1. Subtítulo Vermelho Ajustado com a Fonte Baloo 2 e Cor Exata */
  .nome-curso-topo {
    top: 27.5%;
    left: 14.5%;
    font-family: 'Baloo 2', sans-serif; /* Aplicada a fonte Baloo 2 */
    font-size: 16px;
    font-weight: 800; /* Deixa o subtítulo com peso marcante */
    color: #c10303;   /* Cor vermelha exata solicitada */
    text-transform: uppercase;
    letter-spacing: 1.5px;
    width: 55%;
  }

  /* 2. Bloco Central (Nome, Descrição, Horas, Data) */
  .bloco-conteudo-central {
    position: absolute;
    top: 36.5%;          
    left: 14.5%;         
    width: 55%;        
    height: 195px;     
    display: flex;
    flex-direction: column;
    justify-content: space-between; 
    text-align: left;
  }
  
  .nome-aluno {
    font-family: 'Tan Angleton', 'Playfair Display', 'Times New Roman', serif;
    font-weight: normal;
    margin: 0;
    line-height: 1.1;
    color: #111827;
    white-space: nowrap; /* Impede o nome de quebrar linha */
  }

  .texto-conclusao {
    font-size: 13.5px;
    color: #374151;
    line-height: 1.4;
    margin: 0;
  }

  .carga-horaria {
    font-size: 13px;
    font-weight: bold;
    color: #1f2937;
    margin: 0;
  }

  .texto-data-conclusao {
    font-size: 13px;
    color: #374151;
    margin: 0;
  }

  /* 3. Rodapé do Certificado (Validadores) */
  .id-credencial {
    bottom: 3%;
    left: 27.5%;
    font-size: 11px;
    font-weight: bold;
    text-decoration: underline;
    color: #1f2937;
  }

  .data-emissao {
    bottom: 3%;
    right: 31%;
    font-size: 11px;
    font-weight: bold;
    text-decoration: underline;
    color: #1f2937;
  }

  /* 4. Elementos de Autenticação (QR Code Canto Esquerdo) */
  .bloco-autenticidade {
    position: absolute;
    bottom: 5.5%;
    left: 4.5%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .texto-verificacao {
    font-size: 7.5px;
    color: #6b7280;
    font-family: Arial, sans-serif;
  }

  .qr-code {
    width: 65px;
    height: 65px;
    display: block;
  }

  /* 5. Posicionamento do ano no pequeno selo redondo da Florida */
  .ano-do-selo {
    bottom: 12.8%; 
    right: 23.5%; 
    font-size: 10px;
    font-weight: bold;
    color: #4b5563;
  }

  /* =======================================================
     IMPRESSÃO CONFIGURADA PARA CLONE PERFEITO
     ======================================================= */
  @page {
    size: A4 landscape;
    margin: 0;
  }

  @media print {
    html, body, #app-container {
      display: block !important;
      width: 842px !important;
      height: 595px !important;
      margin: 0 !important;
      padding: 0 !important;
      background: none !important;
      overflow: hidden !important;
    }
    
    .no-print { display: none !important; }
    
    .certificado-area {
      width: 842px !important;   
      height: 595px !important;  
      position: absolute !important;
      top: 0 !important;
      left: 0 !important;
      margin: 0 !important;
      padding: 0 !important;
      box-shadow: none !important;
      page-break-inside: avoid;
      transform: scale(1.333); 
      transform-origin: top left;
    }
  }
</style>
</head>
<body>

<div id="app-container" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
  <div class="card-status">
    <img src="logo-arkia.png" class="logo" alt="Arkia Logo">
    <h1>Certificate Verification</h1>
    <div id="status-mensagem">Loading...</div>
  </div>
</div>

<script>
function formatarDataExtensoIngles(dataString) {
  if (!dataString) return "";
  const partes = dataString.split('-');
  const ano = partes[0];
  const mesNum = parseInt(partes[1], 10);
  const diaNum = parseInt(partes[2], 10);

  const meses = [
    "January", "February", "March", "April", "May", "June",
    "July", "August", "September", "October", "November", "December"
  ];
  const mesExtenso = meses[mesNum - 1] || "January";

  let sufixo = "th";
  if (diaNum === 1 || diaNum === 21 || diaNum === 31) sufixo = "st";
  else if (diaNum === 2 || diaNum === 22) sufixo = "nd";
  else if (diaNum === 3 || diaNum === 23) sufixo = "rd";

  return `the ${diaNum}${sufixo} of ${mesExtenso}, ${ano}`;
}

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const sheetURL = "https://opensheet.elk.sh/1BCPN0p7Mx-cAnZsRoZmnYRaFw1sK4Vm6zVxyzLDZ5RQ/Sheet1";

if (!id) {
  document.getElementById("status-mensagem").innerHTML = "<p class='invalid'>No Certificate ID provided</p>";
} else {
  fetch(sheetURL)
    .then(res => {
      if (!res.ok) throw new Error("Erro ao buscar planilha");
      return res.json();
    })
    .then(data => {
      if (!Array.isArray(data)) throw new Error("Dados inválidos recebidos");

      const cert = data.find(c => c.certificate_id === id);

      if (!cert) {
        document.getElementById("status-mensagem").innerHTML = "<p class='invalid'>Invalid Certificate ID</p>";
        return;
      }

      if (cert.status.toLowerCase() !== "valid") {
        document.getElementById("status-mensagem").innerHTML = "<p class='invalid'>Certificate Revoked</p>";
        return;
      }

      const partesData = cert.data_emissao.split('-');
      const anoCertificado = partesData[0] || "2026";
      const mesCertificado = partesData[1] || "01";

      const urlAtual = window.location.href;
      const urlQrCode = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(urlAtual)}`;
      
      // Conexão direta com a emissora Datatech Florida no LinkedIn
      const linkLinkedin = `https://www.linkedin.com/profile/add?startTask=CERTIFICATION_NAME&name=${encodeURIComponent(cert.curso)}&organizationName=Datatech%20Florida&issueMonth=${mesCertificado}&issueYear=${anoCertificado}&certId=${cert.certificate_id}&certUrl=${encodeURIComponent(urlAtual)}`;
      
      const dataApresentacaoFormatada = formatarDataExtensoIngles(cert.data_emissao);

      document.getElementById("app-container").innerHTML = `
        <div class="painel-controle no-print">
          <img src="logo-arkia.png" style="width: 100px; margin-bottom: 5px;" alt="Arkia">
          <h1 style="margin: 0 0 5px 0; font-size: 20px;">Certificate Verification</h1>
          <p class="valid" style="margin: 0; font-size: 16px;">✓ Valid Certificate</p>
          
          <div class="botoes">
            <button onclick="window.print()" class="btn-baixar">📥 Baixar Certificado (PDF)</button>
            <a id="btnLinkedin" href="${linkLinkedin}" target="_blank" class="btn-linkedin">💼 Adicionar ao LinkedIn</a>
          </div>
        </div>

        <div class="certificado-area">
          <img src="fundo-certificado.png" class="certificado-fundo" alt="Certificado Fundo">
          
          <!-- Subtítulo Vermelho Dinâmico adaptado com Baloo 2 -->
          <div class="texto-dinamico nome-curso-topo">OF THE MASTER OF ${cert.curso.toUpperCase()}</div>
          
          <div class="bloco-conteudo-central">
            <!-- ID "dadosNome" necessário para o script calcular o tamanho da fonte -->
            <h2 class="nome-aluno" id="dadosNome">${cert.nome}</h2>
            <p class="texto-conclusao">Has successfully completed the Master of <strong>${cert.curso}</strong> Certificate program.</p>
            <p class="carga-horaria">Workload - ${cert.carga_horaria} hours</p>
            <p class="texto-data-conclusao">This award was presented on ${dataApresentacaoFormatada} in Florida, USA.</p>
          </div>
          
          <!-- Rodapés Sublinhados com ID e Data -->
          <div class="texto-dinamico id-credencial">${cert.certificate_id}</div>
          <div class="texto-dinamico data-emissao">Issued: ${cert.data_emissao}</div>
          
          <!-- Pequeno ano dinâmico sobre o selo redondo da Florida -->
          <div class="texto-dinamico ano-do-selo">${anoCertificado}</div>
          
          <!-- Bloco Autêntico de Verificação no canto esquerdo -->
          <div class="bloco-autenticidade">
            <span class="texto-verificacao">Verify authenticity at</span>
            <img class="qr-code" src="${urlQrCode}" alt="QR Code">
          </div>
        </div>
      `;

      // --- AJUSTE INTELIGENTE DE TAMANHO DE FONTE (AUTO-FIT) ---
      const nomeElemento = document.getElementById('dadosNome');
      const tamanhoNome = cert.nome.length;

      if (tamanhoNome > 35) {
        nomeElemento.style.fontSize = '20px';
      } else if (tamanhoNome > 28) {
        nomeElemento.style.fontSize = '25px';
      } else if (tamanhoNome > 20) {
        nomeElemento.style.fontSize = '30px';
      } else {
        nomeElemento.style.fontSize = '35px'; // Tamanho original do layout
      }

    })
    .catch(error => {
      document.getElementById("status-mensagem").innerHTML = "<p class='invalid'>Error loading certificate data</p>";
      console.error(error);
    });
}
</script>

</body>
</html>
