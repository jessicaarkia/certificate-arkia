<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Certificate Verification - Arkia</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

<style>
  /* Fonte TAN ANGLETON (Carregada localmente) */
  @font-face {
    font-family: 'Tan Angleton';
    src: url('tan-angleton.woff2') format('woff2'),
         url('tan-angleton.woff') format('woff'),
         url('tan-angleton.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }

  body {
    margin: 0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    min-height: 100vh;
    padding: 20px 0;
    box-sizing: border-box;
    overflow-x: hidden;
  }

  .card-status {
    background: #ffffff;
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    max-width: 500px;
    width: 100%;
    text-align: center;
    margin-top: 10vh;
  }

  .logo { width: 140px; margin-bottom: 20px; }
  h1 { margin: 10px 0; color: #0f172a; font-size: 24px; }
  .valid { color: #16a34a; font-weight: normal; font-size: 18px; margin: 10px 0; }
  .invalid { color: #dc2626; font-weight: normal; font-size: 18px; margin: 10px 0; }

  /* CONTAINER QUE ESCALA TODO O CONJUNTO NO CELULAR */
  #scale-wrapper {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    overflow: hidden;
  }

  #app-container {
    width: 842px;
    display: flex;
    flex-direction: column;
    align-items: center;
    transform-origin: top center;
  }

  /* Painel de Controle Superior (Mesmo tamanho do certificado: 842px) */
  .painel-controle {
    background: #ffffff;
    padding: 20px 30px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    width: 842px;
    text-align: center;
    margin-bottom: 20px;
    box-sizing: border-box;
  }

  .botoes {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 15px;
  }

  .btn-baixar, .btn-linkedin {
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
    border: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }
  .btn-baixar { background-color: #0f172a; color: white; }
  .btn-baixar:hover { background-color: #334155; }
  .btn-linkedin { background-color: #0a66c2; color: white; }
  .btn-linkedin:hover { background-color: #004182; }

  /* =======================================================
     ÁREA DO CERTIFICADO DINÂMICO (LARGURA FIXA DE 842PX)
     ======================================================= */
  .certificado-area {
    position: relative;
    width: 842px;  
    height: 595px;
    margin: 0 auto 30px auto;
    box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    background-color: #ffffff;
    overflow: hidden;
  }

  .certificado-fundo {
    width: 100%;
    height: 100%;
    display: block;
  }

  .texto-dinamico {
    position: absolute;
    color: #111111;
  }

  /* 1. Subtítulo Vermelho */
  .nome-curso-topo {
    top: 26%;       
    left: 10.5%;      
    width: 60%;
    font-family: 'Baloo 2', sans-serif;
    font-size: 24px;
    font-weight: 350;  
    color: #c10303;   
    text-transform: uppercase;
    letter-spacing: 3px;
    text-align: left;
    white-space: nowrap;
  }

  /* 2. Nome do Aluno */
  .nome-aluno-container {
    position: absolute;
    top: 46.5%;         
    left: 10.5%;      
    width: 58%;         
    text-align: left;
    transform: translateY(-100%); 
  }

  .nome-aluno {
    font-family: 'Tan Angleton', 'Playfair Display', 'Times New Roman', serif;
    font-weight: normal; 
    margin: 0;
    line-height: 1.0;  
    color: #111827;
    white-space: nowrap; 
  }

  /* 3. Bloco de Textos de Conclusão */
  .bloco-textos-inferiores {
    position: absolute;
    top: 51%;       
    left: 10.5%;      
    width: 57%;        
    height: 135px;    
    display: flex;
    flex-direction: column;
    justify-content: space-between; 
    text-align: left;
  }

  .texto-conclusao {
    font-family: 'Baloo 2', sans-serif;
    font-size: 15.5px;
    font-weight: 400; 
    color: #374151;
    line-height: 1.4;
    margin: 0;
  }

  .carga-horaria {
    font-family: 'Baloo 2', sans-serif;
    font-size: 15.5px;
    font-weight: 500; 
    color: #1f2937;
    margin: 0;
  }

  .texto-data-conclusao {
    font-family: 'Baloo 2', sans-serif;
    font-size: 13px; 
    font-weight: 400;  
    color: #4b5563;    
    margin: 0;
    margin-top: 10px;  
    line-height: 1.35;  
  }

  /* 4. Rodapé do Certificado */
  .id-credencial {
    bottom: 4.5%;
    left: 2%;
    font-family: 'Segoe UI', sans-serif;
    font-size: 8px;
    font-weight: normal; 
    text-decoration: none;
    color: #1f2937;
  }

  /* 5. Autenticação QR Code */
  .bloco-autenticidade {
    position: absolute;
    bottom: 7%;
    left: 2%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }

  .texto-verificacao {
    font-size: 5.5px;
    color: #6b7280;
    font-family: Arial, sans-serif;
  }

  .qr-code {
    width: 50px;
    height: 50px;
    display: block;
  }

  /* 6. Selo Oficial da Flórida */
  .imagem-selo {
    position: absolute;
    bottom: 10%;       
    right: 22.5%;       
    width: 99px;      
    height: 99px;
    z-index: 10;      
  }

  /* =======================================================
     IMPRESSÃO CONFIGURADA PARA CLONE PERFEITO
     ======================================================= */
  @page {
    size: A4 landscape;
    margin: 0;
  }

  @media print {
    html, body, #scale-wrapper, #app-container {
      display: block !important;
      width: 842px !important;
      height: 595px !important;
      margin: 0 !important;
      padding: 0 !important;
      background: none !important;
      overflow: visible !important;
      transform: none !important;
    }
    
    .no-print { display: none !important; }
    
    .certificado-area {
      width: 842px !important;   
      height: 595px !important;  
      position: absolute !important;
      top: 0 !important;
      left: 0 !important;
      margin: 0 !important;
      padding: 0 !important;
      box-shadow: none !important;
      page-break-inside: avoid;
      transform: scale(1.333); 
      transform-origin: top left;
    }
  }
</style>
</head>
<body>

<div id="scale-wrapper">
  <div id="app-container">
    <div class="card-status">
      <img src="logo-arkia.png" class="logo" alt="Arkia Logo">
      <h1>Certificate Verification</h1>
      <div id="status-mensagem">Loading...</div>
    </div>
  </div>
</div>

<script>
// --- FUNÇÃO QUE ENCOLHE O CERTIFICADO PROPORCIONALMENTE NO CELULAR ---
function ajustarEscalaMobile() {
  const container = document.getElementById('app-container');
  const wrapper = document.getElementById('scale-wrapper');
  if (!container || !wrapper) return;

  // Mede a largura real disponível na tela do celular (com 16px de margem)
  const larguraTela = Math.min(window.innerWidth - 16, 842);
  const escala = larguraTela / 842;

  if (escala < 1) {
    container.style.transform = `scale(${escala})`;
    container.style.transformOrigin = 'top center';
    wrapper.style.height = (container.offsetHeight * escala) + 'px';
  } else {
    container.style.transform = 'none';
    wrapper.style.height = 'auto';
  }
}

window.addEventListener('resize', ajustarEscalaMobile);
window.addEventListener('orientationchange', () => setTimeout(ajustarEscalaMobile, 150));

function formatarDataExtensoIngles(dataString) {
  if (!dataString) return "";
  const partes = dataString.split('-');
  const ano = partes[0];
  const mesNum = parseInt(partes[1], 10);
  const diaNum = parseInt(partes[2], 10);

  const meses = [
    "January", "February", "March", "April", "May", "June",
    "July", "August", "September", "October", "November", "December"
  ];
  const mesExtenso = meses[mesNum - 1] || "January";

  let sufixo = "th";
  if (diaNum === 1 || diaNum === 21 || diaNum === 31) sufixo = "st";
  else if (diaNum === 2 || diaNum === 22) sufixo = "nd";
  else if (diaNum === 3 || diaNum === 23) sufixo = "rd";

  return `the ${diaNum}${sufixo} of ${mesExtenso}, ${ano}`;
}

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const sheetURL = "https://opensheet.elk.sh/1BCPN0p7Mx-cAnZsRoZmnYRaFw1sK4Vm6zVxyzLDZ5RQ/Sheet1";

if (!id) {
  document.getElementById("status-mensagem").innerHTML = "<p class='invalid'>No Certificate ID provided</p>";
  ajustarEscalaMobile();
} else {
  fetch(sheetURL)
    .then(res => {
      if (!res.ok) throw new Error("Erro ao buscar planilha");
      return res.json();
    })
    .then(data => {
      if (!Array.isArray(data)) throw new Error("Dados inválidos recebidos");

      const cert = data.find(c => c.certificate_id === id);

      if (!cert) {
        document.getElementById("status-mensagem").innerHTML = "<p class='invalid'>Invalid Certificate ID</p>";
        ajustarEscalaMobile();
        return;
      }

      if (cert.status.toLowerCase() !== "valid") {
        document.getElementById("status-mensagem").innerHTML = "<p class='invalid'>Certificate Revoked</p>";
        ajustarEscalaMobile();
        return;
      }

      const partesData = cert.data_emissao.split('-');
      const anoCertificado = partesData[0] || "2026";
      const mesCertificado = partesData[1] || "01";

      const urlAtual = window.location.href;
      const urlQrCode = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(urlAtual)}`;
      const linkLinkedin = `https://www.linkedin.com/profile/add?startTask=CERTIFICATION_NAME&name=${encodeURIComponent(cert.curso)}&organizationName=Datatech%20Florida&issueMonth=${mesCertificado}&issueYear=${anoCertificado}&certId=${cert.certificate_id}&certUrl=${encodeURIComponent(urlAtual)}`;
      
      const dataApresentacaoFormatada = formatarDataExtensoIngles(cert.data_emissao);

      document.getElementById("app-container").innerHTML = `
        <div class="painel-controle no-print">
          <img src="logo-arkia.png" style="width: 100px; margin-bottom: 5px;" alt="Arkia">
          <h1 style="margin: 0 0 5px 0; font-size: 20px;">Certificate Verification</h1>
          <p class="valid" style="margin: 0; font-size: 16px;">✓ Valid Certificate</p>
          
          <div class="botoes">
            <button onclick="window.print()" class="btn-baixar">📥 Baixar Certificado (PDF)</button>
            <a id="btnLinkedin" href="${linkLinkedin}" target="_blank" class="btn-linkedin">💼 Adicionar ao LinkedIn</a>
          </div>
        </div>

        <div class="certificado-area">
          <img src="fundo-certificado.png" class="certificado-fundo" alt="Certificado Fundo">
          
          <div class="texto-dinamico nome-curso-topo">OF THE MASTER OF ${cert.curso.toUpperCase()}</div>
          
          <div class="nome-aluno-container">
            <h2 class="nome-aluno" id="dadosNome">${cert.nome}</h2>
          </div>
          
          <div class="bloco-textos-inferiores">
            <p class="texto-conclusao">Has successfully completed the Master of ${cert.curso} Certificate program.</p>
            <p class="carga-horaria">Workload - ${cert.carga_horaria} hours</p>
            <p class="texto-data-conclusao">This award was presented on<br>${dataApresentacaoFormatada} in Florida, USA.</p>
          </div>
          
          <div class="texto-dinamico id-credencial">ID: ${cert.certificate_id}</div>
          
          <img class="texto-dinamico imagem-selo" src="selo-${anoCertificado}.png" alt="Selo Oficial">
          
          <div class="bloco-autenticidade">
            <span class="texto-verificacao">Verify authenticity at</span>
            <img class="qr-code" src="${urlQrCode}" alt="QR Code">
          </div>
        </div>
      `;

      // --- AGUARDA AS FONTES E APLICA O AUTO-FIT + REDIMENSIONAMENTO MOBILE ---
      document.fonts.ready.then(() => {
        
        // 1. AJUSTE DINÂMICO DO NOME DO ALUNO
        const container = document.querySelector('.nome-aluno-container');
        const nomeElemento = document.getElementById('dadosNome');

        if (container && nomeElemento) {
          let fontSize = 48; 
          nomeElemento.style.fontSize = fontSize + 'px';

          while (nomeElemento.scrollWidth > container.clientWidth && fontSize > 16) {
            fontSize--;
            nomeElemento.style.fontSize = fontSize + 'px';
          }
        }
        
        // 2. AJUSTE DINÂMICO DO CURSO
        const cursoElemento = document.querySelector('.nome-curso-topo');
        if (cursoElemento) {
          cursoElemento.style.width = 'auto';
          cursoElemento.style.display = 'inline-block';
          
          const maxCursoWidth = 842 * 0.60; 
          let cursoFontSize = 24; 
          cursoElemento.style.fontSize = cursoFontSize + 'px';

          while (cursoElemento.offsetWidth > maxCursoWidth && cursoFontSize > 12) {
            cursoFontSize--;
            cursoElemento.style.fontSize = cursoFontSize + 'px';
          }

          cursoElemento.style.width = '';
          cursoElemento.style.display = '';
        }

        // 3. ENCOLHE O CERTIFICADO E PAINEL PARA CABER NA TELA DO CELULAR
        ajustarEscalaMobile();

      });

    })
    .catch(error => {
      document.getElementById("status-mensagem").innerHTML = "<p class='invalid'>Error loading certificate data</p>";
      console.error(error);
      ajustarEscalaMobile();
    });
}
</script>
</body>
</html>
