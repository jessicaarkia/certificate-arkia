<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate Verification - Arkia</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

<style>
  /* Fonte TAN ANGLETON (Carregada localmente se o arquivo estiver na pasta do GitHub) */
  @font-face {
    font-family: 'Tan Angleton';
    src: url('tan-angleton.woff2') format('woff2'),
         url('tan-angleton.woff') format('woff'),
         url('tan-angleton.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }

  body {
    margin: 0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    min-height: 100vh;
    padding: 30px 20px;
    box-sizing: border-box;
  }

  .card-status {
    background: #ffffff;
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    max-width: 500px;
    width: 100%;
    text-align: center;
    margin-top: 10vh;
  }

  .logo { width: 140px; margin-bottom: 20px; }
  h1 { margin: 10px 0; color: #0f172a; font-size: 24px; }
  .valid { color: #16a34a; font-weight: normal; font-size: 18px; margin: 10px 0; }
  .invalid { color: #dc2626; font-weight: normal; font-size: 18px; margin: 10px 0; }

  /* Painel de Controle Superior */
  .painel-controle {
    background: #ffffff;
    padding: 24px 40px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    width: 842px;
    max-width: 100%;
    text-align: center;
    margin-bottom: 25px;
    box-sizing: border-box;
  }

  .botoes {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 15px;
  }

  .btn-baixar, .btn-linkedin {
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
    border: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .btn-baixar { background-color: #0f172a; color: white; }
  .btn-baixar:hover { background-color: #334155; }
  .btn-linkedin { background-color: #0a66c2; color: white; }
  .btn-linkedin:hover { background-color: #004182; }

  /* =======================================================
     ÁREA DO CERTIFICADO DINÂMICO
     ======================================================= */
  .certificado-area {
    position: relative;
    width: 842px;  
    height: 595px;
    margin: 0 auto 40px auto;
    box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    background-color: #ffffff;
    overflow: hidden;
  }

  .certificado-fundo {
    width: 100%;
    height: 100%;
    display: block;
  }

  .texto-dinamico {
    position: absolute;
    color: #111111;
  }

  /* 1. Subtítulo Vermelho (OF THE MASTER OF...) - Mantido seu alinhamento perfeito */
  .nome-curso-topo {
    top: 26%;       
    left: 10.5%;      
    width: 70%;

    font-family: 'Baloo 2', sans-serif;
    font-size: 24px;
    font-weight: 350;  
    color: #c10303;   
    text-transform: uppercase;
    letter-spacing: 3px;
    text-align: left;
  }

  /* 2. AJUSTADO: Nome do Aluno alinhado matematicamente pela BASE */
  .nome-aluno-container {
    position: absolute;
    top: 47.2%;       /* Alinha o contêiner exatamente em cima da linha física */
    left: 10.5%;      /* Mantido seu alinhamento perfeito */
    width: 55%;       /* Largura estendida para evitar quebras precoces */
    text-align: left;
    
    /* MÁGICA: Puxa o texto para cima a partir da sua base, colando-o perfeitamente na linha */
    transform: translateY(-100%); 
  }

  .nome-aluno {
    font-family: 'Tan Angleton', 'Playfair Display', 'Times New Roman', serif;
    font-weight: normal; 
    margin: 0;
    line-height: 1.0;  /* Travado em 1.0 para manter a precisão do alinhamento */
    color: #111827;
    white-space: nowrap; 
  }

  /* 3. Bloco de Textos de Conclusão - Mantido seu alinhamento perfeito */
  .bloco-textos-inferiores {
    position: absolute;
    top: 51%;       
    left: 10.5%;      
    width: 50%;        
    height: 115px;    
    display: flex;
    flex-direction: column;
    justify-content: space-between; 
    text-align: left;
  }

  .texto-conclusao {
    font-family: 'Baloo 2', sans-serif;
    font-size: 15.5px;
    font-weight: 400; 
    color: #374151;
    line-height: 1.4;
    margin: 0;
  }

  .carga-horaria {
    font-family: 'Baloo 2', sans-serif;
    font-size: 15.5px;
    font-weight: 500; 
    color: #1f2937;
    margin: 0;
  }

  .texto-data-conclusao {
    font-family: 'Baloo 2', sans-serif;
    font-size: 13px; 
    font-weight: 400;  
    color: #4b5563;    
    margin: 0;
    line-height: 1.35;  
  }

  /* 4. Rodapé do Certificado - Mantido seu alinhamento perfeito */
  .id-credencial {
    bottom: 2%;
    left: 78%;
    font-family: 'Segoe UI', sans-serif;
    font-size: 9px;
    font-weight: normal; 
    text-decoration: none;
    color: #1f2937;
  }

  /* 5. Autenticação QR Code - Mantido seu alinhamento perfeito */
  .bloco-autenticidade {
    position: absolute;
    bottom: 7%;
    left: 2%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }

  .texto-verificacao {
    font-size: 5.5px;
    color: #6b7280;
    font-family: Arial, sans-serif;
  }

  .qr-code {
    width: 50px;
    height: 50px;
    display: block;
  }

  /* 6. Selo Oficial da Flórida - Mantido seu alinhamento perfeito */
  .imagem-selo {
    position: absolute;
    bottom: 10%;       
    right: 22.5%;       
    width: 99px;      
    height: 99px;
    z-index: 10;      
  }

  /* =======================================================
     IMPRESSÃO CONFIGURADA PARA CLONE PERFEITO
     ======================================================= */
  @page {
    size: A4 landscape;
    margin: 0;
  }

  @media print {
    html, body, #app-container {
      display: block !important;
      width: 842px !important;
      height: 595px !important;
      margin: 0 !important;
      padding: 0 !important;
      background: none !important;
      overflow: hidden !important;
    }
    
    .no-print { display: none !important; }
    
    .certificado-area {
      width: 842px !important;   
      height: 595px !important;  
      position: absolute !important;
      top: 0 !important;
      left: 0 !important;
      margin: 0 !important;
      padding: 0 !important;
      box-shadow: none !important;
      page-break-inside: avoid;
      transform: scale(1.333); 
      transform-origin: top left;
    }
  }
</style>
</head>
<body>

<div id="app-container" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
  <div class="card-status">
    <img src="logo-arkia.png" class="logo" alt="Arkia Logo">
    <h1>Certificate Verification</h1>
    <div id="status-mensagem">Loading...</div>
  </div>
</div>

<script>
function formatarDataExtensoIngles(dataString) {
  if (!dataString) return "";
  const partes = dataString.split('-');
  const ano = partes[0];
  const mesNum = parseInt(partes[1], 10);
  const diaNum = parseInt(partes[2], 10);

  const meses = [
    "January", "February", "March", "April", "May", "June",
    "July", "August", "September", "October", "November", "December"
  ];
  const mesExtenso = meses[mesNum - 1] || "January";

  let sufixo = "th";
  if (diaNum === 1 || diaNum === 21 || diaNum === 31) sufixo = "st";
  else if (diaNum === 2 || diaNum === 22) sufixo = "nd";
  else if (diaNum === 3 || diaNum === 23) sufixo = "rd";

  return `the ${diaNum}${sufixo} of ${mesExtenso}, ${ano}`;
}

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const sheetURL = "https://opensheet.elk.sh/1BCPN0p7Mx-cAnZsRoZmnYRaFw1sK4Vm6zVxyzLDZ5RQ/Sheet1";

if (!id) {
  document.getElementById("status-mensagem").innerHTML = "<p class='invalid'>No Certificate ID provided</p>";
} else {
  fetch(sheetURL)
    .then(res => {
      if (!res.ok) throw new Error("Erro ao buscar planilha");
      return res.json();
    })
    .then(data => {
      if (!Array.isArray(data)) throw new Error("Dados inválidos recebidos");

      const cert = data.find(c => c.certificate_id === id);

      if (!cert) {
        document.getElementById("status-mensagem").innerHTML = "<p class='invalid'>Invalid Certificate ID</p>";
        return;
      }

      if (cert.status.toLowerCase() !== "valid") {
        document.getElementById("status-mensagem").innerHTML = "<p class='invalid'>Certificate Revoked</p>";
        return;
      }

      const partesData = cert.data_emissao.split('-');
      const anoCertificado = partesData[0] || "2026";
      const mesCertificado = partesData[1] || "01";

      const urlAtual = window.location.href;
      const urlQrCode = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(urlAtual)}`;
      const linkLinkedin = `https://www.linkedin.com/profile/add?startTask=CERTIFICATION_NAME&name=${encodeURIComponent(cert.curso)}&organizationName=Datatech%20Florida&issueMonth=${mesCertificado}&issueYear=${anoCertificado}&certId=${cert.certificate_id}&certUrl=${encodeURIComponent(urlAtual)}`;
      
      const dataApresentacaoFormatada = formatarDataExtensoIngles(cert.data_emissao);

      document.getElementById("app-container").innerHTML = `
        <div class="painel-controle no-print">
          <img src="logo-arkia.png" style="width: 100px; margin-bottom: 5px;" alt="Arkia">
          <h1 style="margin: 0 0 5px 0; font-size: 20px;">Certificate Verification</h1>
          <p class="valid" style="margin: 0; font-size: 16px;">✓ Valid Certificate</p>
          
          <div class="botoes">
            <button onclick="window.print()" class="btn-baixar">📥 Baixar Certificado (PDF)</button>
            <a id="btnLinkedin" href="${linkLinkedin}" target="_blank" class="btn-linkedin">💼 Adicionar ao LinkedIn</a>
          </div>
        </div>

        <div class="certificado-area">
          <img src="fundo-certificado.png" class="certificado-fundo" alt="Certificado Fundo">
          
          <div class="texto-dinamico nome-curso-topo">OF THE MASTER OF ${cert.curso.toUpperCase()}</div>
          
          <div class="nome-aluno-container">
            <h2 class="nome-aluno" id="dadosNome">${cert.nome}</h2>
          </div>
          
          <div class="bloco-textos-inferiores">
            <p class="texto-conclusao">Has successfully completed the Master of ${cert.curso} Certificate program.</p>
            <p class="carga-horaria">Workload - ${cert.carga_horaria} hours</p>
            <p class="texto-data-conclusao">This award was presented on<br>${dataApresentacaoFormatada} in Florida, USA.</p>
          </div>
          
          <div class="texto-dinamico id-credencial">Credential ID: ${cert.certificate_id}</div>
          
          <img class="texto-dinamico imagem-selo" src="selo-${anoCertificado}.png" alt="Selo Oficial">
          
          <div class="bloco-autenticidade">
            <span class="texto-verificacao">Verify authenticity at</span>
            <img class="qr-code" src="${urlQrCode}" alt="QR Code">
          </div>
        </div>
      `;

      // --- AJUSTE DINÂMICO DE FONTE AMPLIADO E SEGURO (AUTO-FIT) ---
      const nomeElemento = document.getElementById('dadosNome');
      const tamanhoNome = cert.nome.length;

      // Se o nome for gigantesco (Ex: Jéssica Daniele Pereira de Lima Cruz - 36 letras)
      if (tamanhoNome > 35) {
        nomeElemento.style.fontSize = '28px'; // Aumentado para 28px para melhor legibilidade
      } 
      // Se o nome for grande (Ex: Eduardo Henrique Moraes Santos - 29 letras)
      else if (tamanhoNome > 25) {
        nomeElemento.style.fontSize = '34px'; // Aumentado para 34px
      } 
      // Se o nome for médio (Ex: Rodolpho Amorim Moreira - 23 letras)
      else if (tamanhoNome > 18) {
        nomeElemento.style.fontSize = '42px'; // Aumentado para 42px
      } 
      // Se o nome for curto (Ex: Denise Davidson - 15 letras)
      else {
        nomeElemento.style.fontSize = '50px'; // Tamanho máximo perfeito para nomes curtos
      }

    })
    .catch(error => {
      document.getElementById("status-mensagem").innerHTML = "<p class='invalid'>Error loading certificate data</p>";
      console.error(error);
    });
}
</script>

</body>
</html>
