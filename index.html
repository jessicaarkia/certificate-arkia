<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate Verification - Arkia</title>

<style>
  /* Configuração da Tela do Computador */
  body {
    margin: 0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    min-height: 100vh;
    padding: 30px 20px;
    box-sizing: border-box;
  }

  .card-status {
    background: #ffffff;
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    max-width: 500px;
    width: 100%;
    text-align: center;
    margin-top: 10vh;
  }

  .logo {
    width: 140px;
    margin-bottom: 20px;
  }

  h1 {
    margin: 10px 0;
    color: #0f172a;
    font-size: 24px;
  }

  .valid { color: #16a34a; font-weight: bold; font-size: 18px; margin: 10px 0; }
  .invalid { color: #dc2626; font-weight: bold; font-size: 18px; margin: 10px 0; }

  /* Painel de Controle Superior */
  .painel-controle {
    background: #ffffff;
    padding: 24px 40px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    width: 842px;
    max-width: 100%;
    text-align: center;
    margin-bottom: 25px;
    box-sizing: border-box;
  }

  .botoes {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 15px;
  }

  .btn-baixar, .btn-linkedin {
    padding: 12px 24px;
    border-radius: 8px;
    font-weight: bold;
    font-size: 14px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
    border: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .btn-baixar { background-color: #0f172a; color: white; }
  .btn-baixar:hover { background-color: #334155; }
  .btn-linkedin { background-color: #0a66c2; color: white; }
  .btn-linkedin:hover { background-color: #004182; }

  /* =======================================================
     ÁREA DO CERTIFICADO DINÂMICO
     ======================================================= */
  .certificado-area {
    position: relative;
    width: 842px;  
    height: 595px;
    margin: 0 auto 40px auto;
    box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    background-color: #ffffff;
    overflow: hidden;
  }

  .certificado-fundo {
    width: 100%;
    height: 100%;
    display: block;
  }

  .texto-dinamico {
    position: absolute;
    font-family: 'Arial', sans-serif;
    color: #111111;
  }

  /* Alinhamento dos Textos Principais */
  .nome-curso-topo {
    top: 6%;
    left: 27%;
    font-size: 26px;
    font-weight: 800;
    text-transform: uppercase;
    width: 65%;
  }
/* NOVO: Bloco unificado que impede os textos de se atropelarem */
  .bloco-conteudo-central {
    position: absolute;
    top: 32%;          /* Ponto de início do Nome do Aluno */
    left: 31%;         /* Alinhamento à esquerda */
    width: 58%;        /* Largura máxima permitida para o texto */
    display: flex;
    flex-direction: column;
    gap: 15px;         /* DISTÂNCIA SEGURA: Garante espaço fixo entre os textos */
    text-align: left;
  }
  
  .nome-aluno {
    top: 29%; 
    left: 27%;
    font-size: 35px;
    font-weight: 800;
  }

  .texto-conclusao {
    top: 46%;
    left: 27%;
    font-size: 18px;
    color: #222222;
    width: 58%;
    line-height: 1.4;
  }

  .carga-horaria {
    top: 57%;
    left: 27%;
    font-size: 18px;
    font-weight: bold;
  }

  .data-emissao {
    bottom: 3%;
    right: 27%;
    font-size: 13px;
    font-weight: bold;
    text-decoration: underline;
  }

  .id-credencial {
    bottom: 3%;
    left: 27%;
    font-size: 13px;
    font-weight: bold;
    text-decoration: underline;
  }

  /* Elementos Visuais Dinâmicos (Selo e QR Code) */
  .qr-code {
    bottom: 9%;
    left: 7%;
    width: 88px;
    height: 88px;
  }

  .imagem-selo {
    bottom: 17%; 
    right: 23%; 
    width: 85px; 
    height: 85px;
  }

  /* IMPRESSÃO CONFIGURADA */
  @media print {
    body { background: none !important; margin: 0 !important; padding: 0 !important; display: block !important; }
    .no-print { display: none !important; }
    .certificado-area {
      box-shadow: none !important;
      position: absolute !important;
      top: 0 !important;
      left: 0 !important;
      margin: 0 !important;
      page-break-inside: avoid;
    }
  }
</style>
</head>
<body>

<div id="app-container" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
  <div class="card-status">
    <img src="logo-arkia.png" class="logo" alt="Arkia Logo">
    <h1>Certificate Verification</h1>
    <div id="status-mensagem">Loading...</div>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const sheetURL = "https://opensheet.elk.sh/1BCPN0p7Mx-cAnZsRoZmnYRaFw1sK4Vm6zVxyzLDZ5RQ/Sheet1";

if (!id) {
  document.getElementById("status-mensagem").innerHTML = "<p class='invalid'>No Certificate ID provided</p>";
} else {
  fetch(sheetURL)
    .then(res => {
      if (!res.ok) throw new Error("Erro ao buscar planilha");
      return res.json();
    })
    .then(data => {
      const cert = data.find(c => c.certificate_id === id);

      if (!cert) {
        document.getElementById("status-mensagem").innerHTML = "<p class='invalid'>Invalid Certificate ID</p>";
        return;
      }

      if (cert.status.toLowerCase() !== "valid") {
        document.getElementById("status-mensagem").innerHTML = "<p class='invalid'>Certificate Revoked</p>";
        return;
      }

      // Isola ano e mês para os seletores automáticos
      const partesData = cert.data_emissao.split('-');
      const anoCertificado = partesData[0] || "2026";
      const mesCertificado = partesData[1] || "01";

      const urlAtual = window.location.href;
      const urlQrCode = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(urlAtual)}`;
      const linkLinkedin = `https://www.linkedin.com/profile/add?startTask=CERTIFICATION_NAME&name=${encodeURIComponent(cert.curso)}&organizationName=Arkia&issueMonth=${mesCertificado}&issueYear=${anoCertificado}&certId=${cert.certificate_id}&certUrl=${encodeURIComponent(urlAtual)}`;

      // Injeta a estrutura completa corrigida
      document.getElementById("app-container").innerHTML = `
        <div class="painel-controle no-print">
          <img src="logo-arkia.png" style="width: 100px; margin-bottom: 5px;" alt="Arkia">
          <h1 style="margin: 0 0 5px 0; font-size: 20px;">Certificate Verification</h1>
          <p class="valid" style="margin: 0; font-size: 16px;">✓ Valid Certificate</p>
          
          <div class="botoes">
            <button onclick="window.print()" class="btn-baixar">📥 Baixar Certificado (PDF)</button>
            <a id="btnLinkedin" href="${linkLinkedin}" target="_blank" class="btn-linkedin">💼 Adicionar ao LinkedIn</a>
          </div>
        </div>

        <div class="certificado-area">
          <img src="fundo-certificado.png" class="certificado-fundo" alt="Certificado Fundo">
          
          <div class="texto-dinamico nome-curso-topo">${cert.curso}</div>
          <div class="texto-dinamico nome-aluno">${cert.nome}</div>
          <div class="texto-dinamico texto-conclusao">Has successfully completed the Master of <strong>${cert.curso}</strong> Certificate program.</div>
          <div class="texto-dinamico carga-horaria">Workload - ${cert.carga_horaria} hours</div>
          <div class="texto-dinamico data-emissao">Issued: ${cert.data_emissao}</div>
          <div class="texto-dinamico id-credencial">${cert.certificate_id}</div>
          
          <img class="texto-dinamico imagem-selo" src="selo-${anoCertificado}.png" alt="Selo Oficial">
          
          <img id="qrCodeDinamico" class="texto-dinamico qr-code" src="${urlQrCode}" alt="QR Code">
        </div>
      `;
    })
    .catch(error => {
      document.getElementById("status-mensagem").innerHTML = "<p class='invalid'>Error loading certificate data</p>";
      console.error(error);
    });
}
</script>

</body>
</html>
